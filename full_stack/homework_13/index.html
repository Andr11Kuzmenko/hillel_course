<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>SVG Spinner Shapes</title>
    <link rel="stylesheet" href="styles/styles.css">
</head>

<body>
    <h2>SVG Shape Spinner</h2>
    <svg width="700" height="400" viewBox="0 0 700 400">
        <g class="orbit orbit-1">
            <rect class="shape square" x="350" y="80" width="60" height="60" />
        </g>
        <g class="orbit orbit-2">
            <rect class="shape rectangle" x="350" y="60" width="100" height="50" />
        </g>
        <g class="orbit orbit-3">
            <circle class="shape circle animated" cx="350" cy="50" r="30" />
        </g>
        <g class="orbit orbit-4">
            <ellipse class="shape ellipse" cx="350" cy="40" rx="50" ry="30" />
        </g>
    </svg>
</body>

</html>
